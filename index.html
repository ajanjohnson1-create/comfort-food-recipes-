  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">My Recipe Book</div>
      <div class="header-actions">
        <button class="btn-shopping" onclick="openShopping()">Shopping List <span id="shopping-count" class="badge" style="display:none">0</span></button>
        <button class="btn-add" onclick="openAddModal()">+ New Recipe</button>
      </div>
    </div>
  </header>

  <!-- SEARCH & FILTERS -->
  <section class="hero">
    <div class="hero-inner">
      <div class="search-bar-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:0.5;flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="Search recipes or ingredients..." oninput="filterRecipes()" />
      </div>
      <div class="filters">
        <button class="filter-pill active" data-filter="all" onclick="setFilter(this,'all')">All</button>
        <button class="filter-pill" data-filter="breakfast" onclick="setFilter(this,'breakfast')">Breakfast</button>
        <button class="filter-pill" data-filter="lunch" onclick="setFilter(this,'lunch')">Lunch</button>
        <button class="filter-pill" data-filter="dinner" onclick="setFilter(this,'dinner')">Dinner</button>
        <button class="filter-pill" data-filter="snack" onclick="setFilter(this,'snack')">Snack</button>
        <button class="filter-pill" data-filter="dessert" onclick="setFilter(this,'dessert')">Dessert</button>
        <button class="filter-pill" data-filter="favourite" onclick="setFilter(this,'favourite')">Favourites</button>
      </div>
    </div>
  </section>

  <!-- RECIPE GRID -->
  <main class="main">
    <div class="stats-bar"><span id="recipe-count"></span></div>
    <div class="recipe-grid" id="recipe-grid">
      <div class="empty-state" id="empty-state">
        <div class="empty-leaf">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#9ab89e" stroke-width="1"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c4.5 0 8.5-2.5 9.5-7-1.5 1-3 1.5-4.5 1.5C13 16.5 9 12.5 9 8c0-1.5.5-3 1.5-4.5C9 4 12 2 12 2z"/></svg>
        </div>
        <h2>No recipes yet</h2>
        <p>Begin your collection by adding your first recipe</p>
        <button class="btn-add" onclick="openAddModal()">Add Your First Recipe</button>
      </div>
    </div>
  </main>

  <!-- ADD / EDIT MODAL -->
  <div class="modal-overlay" id="add-modal" onclick="closeModalOutside(event,'add-modal')">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">New Recipe</h2>
        <button class="modal-close" onclick="closeModal('add-modal')">&#10005;</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label>Recipe Name</label>
            <input type="text" id="f-name" placeholder="e.g. Grandma's Pasta" />
          </div>
          <div class="form-group form-group-sm">
            <label>Category</label>
            <select id="f-category">
              <option value="breakfast">Breakfast</option>
              <option value="lunch">Lunch</option>
              <option value="dinner" selected>Dinner</option>
              <option value="snack">Snack</option>
              <option value="dessert">Dessert</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group form-group-sm"><label>Prep Time</label><input type="text" id="f-prep" placeholder="15 mins"/></div>
          <div class="form-group form-group-sm"><label>Cook Time</label><input type="text" id="f-cook" placeholder="30 mins"/></div>
          <div class="form-group form-group-sm"><label>Servings</label><input type="number" id="f-servings" value="4" min="1" max="100"/></div>
        </div>
        <div class="form-group"><label>Description</label><input type="text" id="f-desc" placeholder="A short description..."/></div>
        <div class="form-group"><label>Ingredients <span class="label-hint">— one per line</span></label><textarea id="f-ingredients" rows="6" placeholder="2 cups flour&#10;1 tsp salt&#10;3 eggs"></textarea></div>
        <div class="form-group"><label>Steps <span class="label-hint">— one per line</span></label><textarea id="f-steps" rows="7" placeholder="Preheat oven to 180°C&#10;Mix dry ingredients&#10;Add eggs and milk"></textarea></div>
        <div class="form-group"><label>Tags <span class="label-hint">— comma separated</span></label><input type="text" id="f-tags" placeholder="quick, vegetarian, comfort food"/></div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal('add-modal')">Cancel</button>
        <button class="btn-primary" onclick="saveRecipe()">Save Recipe</button>
      </div>
    </div>
  </div>

  <!-- VIEW MODAL -->
  <div class="modal-overlay" id="view-modal" onclick="closeModalOutside(event,'view-modal')">
    <div class="modal modal-wide">
      <div class="modal-header">
        <div class="view-title-row">
          <h2 id="view-name">Recipe</h2>
          <span id="view-category-badge" class="category-badge"></span>
        </div>
        <div class="view-header-actions">
          <button class="btn-fav" id="fav-btn" onclick="toggleFavourite()">&#9825;</button>
          <button class="btn-edit-sm" onclick="editCurrentRecipe()">Edit</button>
          <button class="modal-close" onclick="closeModal('view-modal')">&#10005;</button>
        </div>
      </div>
      <div class="modal-body">
        <div class="view-meta">
          <span id="view-prep"></span>
          <span id="view-cook"></span>
          <div class="servings-control">
            <button onclick="changeServings(-1)">&#8722;</button>
            <span id="view-servings">4</span>
            <button onclick="changeServings(1)">+</button>
            <span>servings</span>
          </div>
        </div>
        <p id="view-desc" class="view-desc"></p>
        <div class="view-cols">
          <div class="view-col">
            <div class="col-header">
              <h3>Ingredients</h3>
              <button class="btn-to-shopping" onclick="addAllToShopping()">+ Add to shopping list</button>
            </div>
            <ul id="view-ingredients" class="check-list"></ul>
          </div>
          <div class="view-col">
            <h3>Method</h3>
            <ol id="view-steps" class="check-list steps-list"></ol>
          </div>
        </div>
        <div id="view-tags" class="view-tags"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-danger" onclick="deleteCurrentRecipe()">Delete Recipe</button>
        <button class="btn-primary" onclick="closeModal('view-modal')">Done</button>
      </div>
    </div>
  </div>

  <!-- SHOPPING MODAL -->
  <div class="modal-overlay" id="shopping-modal" onclick="closeModalOutside(event,'shopping-modal')">
    <div class="modal">
      <div class="modal-header">
        <h2>Shopping List</h2>
        <button class="modal-close" onclick="closeModal('shopping-modal')">&#10005;</button>
      </div>
      <div class="modal-body">
        <div class="shopping-add-row">
          <input type="text" id="shopping-input" placeholder="Add an item..." onkeydown="shoppingKeydown(event)"/>
          <button class="btn-primary" onclick="addShoppingItem()">Add</button>
        </div>
        <ul id="shopping-list" class="shopping-list"></ul>
        <p id="shopping-empty" class="shopping-empty">Your list is empty. Open a recipe and add all ingredients at once.</p>
      </div>
      <div class="modal-footer">
        <button class="btn-danger" onclick="clearShopping()">Clear all</button>
        <button class="btn-primary" onclick="closeModal('shopping-modal')">Done</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="recipe-app.js"></script>
</body>
