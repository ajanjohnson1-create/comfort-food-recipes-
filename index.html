<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Recipe Book 🍳</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="recipe-style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-emoji">🍳</span>
        <span class="logo-text">My Recipe Book</span>
      </div>
      <div class="header-actions">
        <button class="btn-shopping" onclick="openShopping()">🛒 Shopping List <span id="shopping-count" class="badge" style="display:none">0</span></button>
        <button class="btn-add" onclick="openAddModal()">+ Add Recipe</button>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-inner">
      <div class="search-bar-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search recipes or ingredients..." oninput="filterRecipes()" />
      </div>
      <div class="filters">
        <button class="filter-pill active" data-filter="all" onclick="setFilter(this, 'all')">All</button>
        <button class="filter-pill" data-filter="breakfast" onclick="setFilter(this, 'breakfast')">🌅 Breakfast</button>
        <button class="filter-pill" data-filter="lunch" onclick="setFilter(this, 'lunch')">☀️ Lunch</button>
        <button class="filter-pill" data-filter="dinner" onclick="setFilter(this, 'dinner')">🌙 Dinner</button>
        <button class="filter-pill" data-filter="snack" onclick="setFilter(this, 'snack')">🍿 Snack</button>
        <button class="filter-pill" data-filter="dessert" onclick="setFilter(this, 'dessert')">🍰 Dessert</button>
        <button class="filter-pill" data-filter="favourite" onclick="setFilter(this, 'favourite')">❤️ Favourites</button>
      </div>
    </div>
  </section>

  <!-- RECIPE GRID -->
  <main class="main">
    <div class="stats-bar">
      <span id="recipe-count">0 recipes</span>
    </div>
    <div class="recipe-grid" id="recipe-grid">
      <div class="empty-state" id="empty-state">
        <div class="empty-emoji">👨‍🍳</div>
        <h2>No recipes yet!</h2>
        <p>Click "Add Recipe" to get cooking</p>
        <button class="btn-add" onclick="openAddModal()">+ Add Your First Recipe</button>
      </div>
    </div>
  </main>

  <!-- ADD/EDIT RECIPE MODAL -->
  <div class="modal-overlay" id="add-modal" onclick="closeModalOutside(event, 'add-modal')">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">✨ New Recipe</h2>
        <button class="modal-close" onclick="closeModal('add-modal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label>Recipe Name *</label>
            <input type="text" id="f-name" placeholder="e.g. Grandma's Pasta" />
          </div>
          <div class="form-group form-group-sm">
            <label>Category</label>
            <select id="f-category">
              <option value="breakfast">🌅 Breakfast</option>
              <option value="lunch">☀️ Lunch</option>
              <option value="dinner" selected>🌙 Dinner</option>
              <option value="snack">🍿 Snack</option>
              <option value="dessert">🍰 Dessert</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group form-group-sm">
            <label>⏱ Prep Time</label>
            <input type="text" id="f-prep" placeholder="e.g. 15 mins" />
          </div>
          <div class="form-group form-group-sm">
            <label>🔥 Cook Time</label>
            <input type="text" id="f-cook" placeholder="e.g. 30 mins" />
          </div>
          <div class="form-group form-group-sm">
            <label>🍽 Servings</label>
            <input type="number" id="f-servings" value="4" min="1" max="100" />
          </div>
        </div>
        <div class="form-group">
          <label>📝 Description</label>
          <input type="text" id="f-desc" placeholder="A short description of the dish..." />
        </div>
        <div class="form-group">
          <label>🥕 Ingredients <span class="label-hint">(one per line)</span></label>
          <textarea id="f-ingredients" rows="6" placeholder="2 cups flour&#10;1 tsp salt&#10;3 eggs&#10;..."></textarea>
        </div>
        <div class="form-group">
          <label>👨‍🍳 Steps <span class="label-hint">(one per line)</span></label>
          <textarea id="f-steps" rows="7" placeholder="Preheat oven to 180°C&#10;Mix dry ingredients&#10;Add eggs and milk&#10;..."></textarea>
        </div>
        <div class="form-group">
          <label>🏷 Tags <span class="label-hint">(comma separated)</span></label>
          <input type="text" id="f-tags" placeholder="e.g. quick, vegetarian, spicy" />
        </div>
        <div class="form-group">
          <label>🖼 Emoji Icon</label>
          <input type="text" id="f-emoji" placeholder="🍝" maxlength="4" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal('add-modal')">Cancel</button>
        <button class="btn-save" onclick="saveRecipe()">Save Recipe 🎉</button>
      </div>
    </div>
  </div>

  <!-- VIEW RECIPE MODAL -->
  <div class="modal-overlay" id="view-modal" onclick="closeModalOutside(event, 'view-modal')">
    <div class="modal modal-wide">
      <div class="modal-header">
        <div class="view-title-row">
          <span id="view-emoji" style="font-size:2rem">🍝</span>
          <div>
            <h2 id="view-name">Recipe Name</h2>
            <div id="view-category-badge" class="category-badge"></div>
          </div>
        </div>
        <div class="view-header-actions">
          <button class="btn-fav" id="fav-btn" onclick="toggleFavourite()">🤍</button>
          <button class="btn-edit" onclick="editCurrentRecipe()">✏️ Edit</button>
          <button class="modal-close" onclick="closeModal('view-modal')">✕</button>
        </div>
      </div>
      <div class="modal-body">
        <div class="view-meta">
          <span id="view-prep">⏱ —</span>
          <span id="view-cook">🔥 —</span>
          <div class="servings-control">
            <span>🍽</span>
            <button onclick="changeServings(-1)">−</button>
            <span id="view-servings">4</span>
            <button onclick="changeServings(1)">+</button>
            <span>servings</span>
          </div>
        </div>
        <p id="view-desc" class="view-desc"></p>

        <div class="view-cols">
          <div class="view-col">
            <div class="col-header">
              <h3>🥕 Ingredients</h3>
              <button class="btn-add-shopping" onclick="addAllToShopping()">+ Add all to shopping list</button>
            </div>
            <ul id="view-ingredients" class="check-list"></ul>
          </div>
          <div class="view-col">
            <h3>👨‍🍳 Steps</h3>
            <ol id="view-steps" class="check-list steps-list"></ol>
          </div>
        </div>

        <div id="view-tags" class="view-tags"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-danger" onclick="deleteCurrentRecipe()">🗑 Delete</button>
        <button class="btn-save" onclick="closeModal('view-modal')">Done</button>
      </div>
    </div>
  </div>

  <!-- SHOPPING LIST MODAL -->
  <div class="modal-overlay" id="shopping-modal" onclick="closeModalOutside(event, 'shopping-modal')">
    <div class="modal">
      <div class="modal-header">
        <h2>🛒 Shopping List</h2>
        <button class="modal-close" onclick="closeModal('shopping-modal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="shopping-add-row">
          <input type="text" id="shopping-input" placeholder="Add an item..." onkeydown="shoppingKeydown(event)" />
          <button class="btn-save" onclick="addShoppingItem()">Add</button>
        </div>
        <ul id="shopping-list" class="shopping-list"></ul>
        <div id="shopping-empty" class="shopping-empty">No items yet! Add some or open a recipe and click "Add all to shopping list".</div>
      </div>
      <div class="modal-footer">
        <button class="btn-danger" onclick="clearShopping()">Clear all</button>
        <button class="btn-save" onclick="closeModal('shopping-modal')">Done</button>
      </div>
    </div>
  </div>

  <script src="recipe-app.js"></script>
</body>
</html>
